server {
    listen 172.20.0.3:7000 proxy_protocol;
    server_name [ONION_SERVICE_1_ADDRESS].onion [ONION_SERVICE_2_ADDRESS].onion;
    
    # Trust PROXY protocol from Tor container
    set_real_ip_from 172.20.0.0/16;  # Docker's default bridge network
    real_ip_header proxy_protocol;

    large_client_header_buffers 4 16k;
    client_header_buffer_size 4k;

    location / {
        proxy_http_version 1.1;
        proxy_pass http://172.21.0.3:8000;  # Using service name
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $realip_remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Connection "keep-alive";
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}

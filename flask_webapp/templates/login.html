<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DarkMarket - Login</title><link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}"></head><body><div class="login-container"><h1>DarkNet Market Access</h1>{% with messages = get_flashed_messages() %} {% if messages %}<div class="flash-messages">{% for message in messages %}<p>{{ message }}</p>{% endfor %}</div>{% endif %} {% endwith %}<form action="/login" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="form-group"><label for="username">Username:</label><input type="text" id="username" name="username" required></div><div class="form-group"><label for="password">Password:</label><input type="password" id="password" name="password" required></div><div class="captcha-container"><div class="captcha-title">Security Verification (case-insensitive):</div><img src="{{ captcha_image }}" alt="CAPTCHA" class="captcha-image" id="captcha-image"><div class="form-group"><label for="captcha-text">Enter the code shown above:</label><input type="text" id="captcha-text" name="captcha-text" required></div><button type="button" class="refresh-captcha" id="refresh-captcha-btn">↻ New Verification Code</button></div><button type="submit">Access Moderator Portal</button></form><p class="info-text">SECURE CONNECTION | TOR ONLY | v2.4.7</p><p class="info-text">Last connection: {{ last_login_time }}</p></div><script src="{{ url_for('static', filename='js/login.js') }}"></script></body></html>
